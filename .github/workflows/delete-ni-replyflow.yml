name: Delete ni-replyflow edge function

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Delete orphaned ni-replyflow function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret is not configured."
            exit 1
          fi
          supabase functions delete ni-replyflow --project-ref kxijunwgbrlfzvgkhklo
