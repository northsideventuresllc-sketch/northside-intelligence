name: ARM3 Sector 3 Pipeline

on:
  schedule:
    # 10am ET Mon / Wed / Fri (14:00 UTC)
    - cron: "0 14 * * 1,3,5"
  workflow_dispatch:

jobs:
  generate-tool:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase Edge Function — generate-tool
        id: generate
        run: |
          set -euo pipefail
          response_file="$(mktemp)"
          http_code="$(
            curl -sS -o "$response_file" -w '%{http_code}' -X POST \
              "${SUPABASE_URL}/functions/v1/generate-tool" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"source":"github_actions_arm3_pipeline"}'
          )"
          echo "HTTP ${http_code}"
          cat "$response_file"
          echo "http_code=${http_code}" >> "$GITHUB_OUTPUT"
          if [[ "$http_code" -lt 200 || "$http_code" -ge 300 ]]; then
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Log pipeline result to arm3_weekly_logs
        if: success()
        run: |
          curl -sS -X POST \
            "${SUPABASE_URL}/rest/v1/arm3_weekly_logs" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$(jq -n \
              --arg week "$(date -u +%F)" \
              --arg run_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{
                week_of: $week,
                log_type: "pipeline_cron",
                summary: "ARM3 pipeline cron completed",
                detail: { status: "cron_success", run_date: $run_date, source: "github_actions" }
              }')"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
